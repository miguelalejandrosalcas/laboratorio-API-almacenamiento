<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokédex | Buscador de Pokémon</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body> <!-- onload="updateFavoritesList()" -->

  <!-- ====================== NAVBAR ====================== -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand mb-0">Pokédex</span>
    </div>
  </nav>

  <main class="container py-4">

    <!-- ====== boton buscar ============ -->
    <div class="row justify-content-center mb-4">
      <div class="col-12 col-md-6">
        <h1 class="h4 text-center mb-3">Busca tu Pokémon</h1>
        <div class="input-group">
          <input
            type="text"
            id="pokemonInput"
            class="form-control"
            placeholder="Nombre del Pokémon"
            aria-label="Nombre del Pokémon">
          <button id="btnBuscar" class="btn btn-primary" type="button" onclick="searchPokemon()">
            Buscar
          </button>
        </div>
      </div>
    </div>

    <!-- ============ Tarea 1.3 y 1.4: resultado + boton favorito ============ -->
    <div class="row justify-content-center mb-4">
      <div class="col-12 col-md-6">
        <div id="resultado" class="card text-center p-3">
          <p class="text-muted mb-0">información del Pokémon.</p>
         
        </div>
        <div class="text-center mt-3">
            <button id="btnGuardarFavorito" class="btn btn-outline-primary" type="button">  <!-- onclick="saveFavorite()" -->
            Guardar como favorito
          </button>
        </div>
      </div>
    </div>

    <!-- ========lista de favoritos ===== -->
    <div class="row justify-content-center">
      <div class="col-12 col-md-8">
        <h2 class="h4 mb-3">Mis favoritos</h2>
        <div id="favoritos" class="row g-3">
          <p class="text-muted" id="favoritosPlaceholder">Todavía no tienes favoritos guardados.</p>
          <!--  card por cada pokémon favorito -->
        </div>
      </div>
    </div>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="scritp.js"></script>
</body>
</html>
